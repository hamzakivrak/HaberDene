<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Portalı | Kesin Çözüm</title>
    <style>
        /* Modern Karanlık Tema Tasarımı */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding: 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin: 30px 0;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .controls {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        select, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            outline: none;
        }

        select {
            background: #0f172a;
            color: white;
            cursor: pointer;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .news-grid {
            display: grid;
            gap: 20px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .news-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #000;
        }

        .news-content {
            padding: 20px;
        }

        .news-content h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .read-more {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .info-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .error-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 20px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        @media (min-width: 600px) {
            .controls { flex-direction: row; }
            select { flex: 1; }
            button { flex: 0 0 160px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Haber Portalı</h1>
            <p>Engelleri aşan güncel haber akışı</p>
        </header>

        <div class="controls">
            <select id="category">
                <option value="general">Gündem</option>
                <option value="nation">Türkiye</option>
                <option value="technology">Teknoloji</option>
                <option value="business">Ekonomi</option>
                <option value="sports">Spor</option>
                <option value="science">Bilim</option>
            </select>
            <button onclick="loadNews()">Haberleri Al</button>
        </div>

        <div id="output" class="news-grid">
            <div class="info-msg">Haberleri listelemek için butona dokunun.</div>
        </div>
    </div>

    <script>
        const API_KEY = 'bbd421535d7720c357f2d5a4d2e9be23';

        async function loadNews() {
            const output = document.getElementById('output');
            const category = document.getElementById('category').value;
            
            output.innerHTML = '<div class="info-msg">Güvenli bağlantı kuruluyor...</div>';

            const rawUrl = `https://gnews.io/api/v4/top-headlines?category=${category}&lang=tr&country=tr&max=10&apikey=${API_KEY}`;
            
            // "Failed to fetch" hatasını aşmak için Vekil Sunucu (Proxy) kullanıyoruz
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rawUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error("Bağlantı sunucusu yanıt vermiyor.");

                const proxyData = await response.json();
                // Allorigins veriyi 'contents' içinde string olarak döndürür
                const data = JSON.parse(proxyData.contents);

                if (data.errors) {
                    throw new Error(data.errors[0]);
                }

                if (!data.articles || data.articles.length === 0) {
                    output.innerHTML = '<div class="info-msg">Şu an gösterilecek haber bulunamadı.</div>';
                    return;
                }

                output.innerHTML = '';
                data.articles.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <img src="${item.image || 'https://via.placeholder.com/400x200?text=Resim+Yok'}" alt="Haber" onerror="this.src='https://via.placeholder.com/400x200?text=Resim+Hatas%C4%B1'">
                        <div class="news-content">
                            <h3>${item.title}</h3>
                            <div class="news-footer">
                                <small>${item.source.name}</small>
                                <a href="${item.url}" target="_blank" class="read-more">OKU →</a>
                            </div>
                        </div>
                    `;
                    output.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                output.innerHTML = `
                    <div class="error-box">
                        <strong>Bağlantı Hatası</strong><br>
                        Haberler çekilemedi. Bu durum genellikle internet servis sağlayıcınızın kısıtlamalarından kaynaklanır.<br><br>
                        <em>Detay: ${err.message}</em>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
