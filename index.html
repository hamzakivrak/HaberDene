<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Portalı | GNews</title>
    <style>
        /* Modern Karanlık Tema Tasarımı */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Kontrol Paneli */
        .controls {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        select {
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: var(--bg-dark);
            color: white;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            appearance: none;
        }

        button {
            padding: 14px;
            border-radius: 10px;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Haber Kartları */
        .news-grid {
            display: grid;
            gap: 24px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .news-card:hover {
            transform: scale(1.01);
        }

        .news-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background-color: #000;
        }

        .news-content {
            padding: 24px;
        }

        .news-content h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--text-main);
            line-height: 1.3;
        }

        .news-content p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .news-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-name {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        .read-link {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 2px;
        }

        /* Durum Mesajları */
        .status-message {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
            font-style: italic;
        }

        .error-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        @media (min-width: 768px) {
            .controls {
                flex-direction: row;
                align-items: center;
            }
            select {
                flex: 1;
            }
            button {
                flex: 0 0 200px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Haber Portalı</h1>
            <p>Türkiye'den ve dünyadan en güncel başlıklar</p>
        </header>

        <div class="controls">
            <select id="categorySelect">
                <option value="general">Genel Gündem</option>
                <option value="nation">Türkiye'den Haberler</option>
                <option value="world">Dünya Haberleri</option>
                <option value="technology">Teknoloji</option>
                <option value="business">Ekonomi</option>
                <option value="sports">Spor</option>
                <option value="science">Bilim</option>
                <option value="health">Sağlık</option>
                <option value="entertainment">Eğlence / Magazin</option>
            </select>
            <button onclick="fetchGNews()">Haberleri Getir</button>
        </div>

        <div id="newsGrid" class="news-grid">
            <div class="status-message">Lütfen bir kategori seçip haberleri yükleyin.</div>
        </div>
    </div>

    <script>
        // Senin GNews API Anahtarın
        const API_KEY = 'bbd421535d7720c357f2d5a4d2e9be23';

        async function fetchGNews() {
            const grid = document.getElementById('newsGrid');
            const category = document.getElementById('categorySelect').value;
            
            // Yükleniyor animasyonu/metni
            grid.innerHTML = '<div class="status-message">Haberler çekiliyor, lütfen bekleyin...</div>';

            // GNews API URL Yapılandırması
            // lang=tr ve country=tr ile Türkçe içerikleri hedefleriz
            const url = `https://gnews.io/api/v4/top-headlines?category=${category}&lang=tr&country=tr&max=12&apikey=${API_KEY}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.errors ? data.errors[0] : 'Haberler alınırken bir hata oluştu.');
                }

                if (data.articles.length === 0) {
                    grid.innerHTML = '<div class="status-message">Seçilen kategoride şu an haber bulunamadı.</div>';
                    return;
                }

                grid.innerHTML = ''; // Temizle

                data.articles.forEach(article => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    
                    // Görsel kontrolü
                    const imageUrl = article.image || 'https://via.placeholder.com/800x450/1e293b/94a3b8?text=Haber+Gorseli+Yok';

                    card.innerHTML = `
                        <img src="${imageUrl}" alt="Haber" loading="lazy">
                        <div class="news-content">
                            <h3>${article.title}</h3>
                            <p>${article.description || 'Haber özeti bulunmuyor.'}</p>
                            <div class="news-footer">
                                <span class="source-name">${article.source.name}</span>
                                <a href="${article.url}" target="_blank" class="read-link">TAMAMINI OKU →</a>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Hata:", error);
                grid.innerHTML = `
                    <div class="error-box">
                        <strong>Hata Oluştu!</strong><br>
                        ${error.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
